baseURL = "https://allfry007.github.io/smart-invest/"
languageCode = "fr-fr"
title = "Smart Invest"
theme = "PaperMod"
paginate = 10

[params]
  env = "production"
  description = "Guide expert : investissement crypto, DCA, staking, trading et finance personnelle"
  author = "Smart Invest"
  defaultTheme = "auto"
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  disableSpecial1stPost = true
  ShowToc = true
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "Smart Invest"
    Content = "Guide expert en investissement crypto, DCA, staking, trading algorithmique et finance personnelle. Articles avec données réelles et analyses approfondies."

  [params.cover]
    hidden = false
    hiddenInList = false

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/allfry007"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.main]]
  name = "Articles"
  url = "/posts/"
  weight = 1

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 2

[[menu.main]]
  name = "Catégories"
  url = "/categories/"
  weight = 3
